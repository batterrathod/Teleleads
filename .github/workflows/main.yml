name: Run Telegram Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install
        run: npm install node-telegram-bot-api axios csv-parser json2csv cloudinary streamifier

      - name: Run Bot
        run: timeout 5h node app.js || true
